model:
  embed_dim: 768
  num_layers: 12
  num_heads: 12
  mlp_hidden_dim: 3072
  attn_dropout: 0.0
  mlp_dropout: 0.0
  phase_scale: 0.7853981633974483
  rotary_interleaved: false
  normalize_condition_tokens: true
  expression_tokenizer:
    num_bins: 64
    max_log1p_value: 10.0

data:
  name: synthetic
  batch_size: 256
  max_tokens: 2048
  num_workers: 0
  synthetic:
    num_cells: 32
    num_genes: 256
    num_cell_types: 8
    density: 0.2
    seed: 7

optimizer:
  name: adamw
  lr: 5.0e-5
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.01

scheduler:
  name: linear_warmup_decay
  warmup_ratio: 0.03
  min_lr_ratio: 0.2

runtime:
  seed: 7
  precision: bf16
  activation_checkpointing: true
  fsdp:
    enabled: true
    sharding_strategy: FULL_SHARD
    use_orig_params: true
    limit_all_gathers: true
    sync_module_states: true

trainer:
  gradient_accumulation_steps: 1
  grad_clip_norm: 1.0
  log_every_steps: 10
  save_every_epochs: 1
